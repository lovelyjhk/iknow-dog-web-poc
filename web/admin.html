<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2f5fbd" />
    <title>관리자 설정 | 나아파</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="legal-page">
    <main class="legal-document">
      <a class="legal-back" href="./index.html">앱으로 돌아가기</a>
      <h1>관리자 설정</h1>
      <p>
        API key는 이 페이지나 브라우저 저장소에 저장하지 않습니다. 입력한 key는 HTTPS로 Worker의
        <code>/admin/config</code>에 전송되고, Worker가 관리자 인증 후 KV에 암호화 저장합니다.
      </p>

      <section class="card form admin-form">
        <p class="eyebrow">Worker auth</p>
        <h3>관리자 인증</h3>
        <label>
          Worker URL
          <input id="workerUrl" type="url" placeholder="https://iknow-dog-ai.example.workers.dev" autocomplete="off" />
        </label>
        <div class="form-grid">
          <label>
            관리자 아이디
            <input id="adminUser" autocomplete="username" placeholder="admin" />
          </label>
          <label>
            관리자 패스워드
            <input id="adminPassword" type="password" autocomplete="current-password" />
          </label>
        </div>
        <div class="action-list">
          <button class="secondary-action" id="loadConfig" type="button">현재 설정 확인</button>
          <button class="secondary-action" id="testWorker" type="button">Worker 상태 테스트</button>
        </div>
      </section>

      <section class="card form admin-form">
        <p class="eyebrow">OpenAI config</p>
        <h3>LLM 설정 저장</h3>
        <label>
          OpenAI API key
          <input id="openAiApiKey" type="password" placeholder="sk-... 또는 프로젝트 key" autocomplete="off" />
        </label>
        <div class="form-grid">
          <label>
            모델
            <input id="model" value="gpt-4.1-mini" autocomplete="off" />
          </label>
          <label>
            허용 Origin
            <input id="allowedOrigins" value="https://lovelyjhk.github.io,http://localhost:8787" autocomplete="off" />
          </label>
        </div>
        <button class="primary-action full" id="saveConfig" type="button">Worker에 암호화 저장</button>
        <p class="hint">API key 칸을 비워두고 저장하면 기존 저장 key는 유지하고 모델/Origin만 갱신합니다.</p>
      </section>

      <section class="card">
        <p class="eyebrow">Status</p>
        <h3>상태</h3>
        <pre class="report-box admin-status" id="adminStatus">대기 중</pre>
      </section>
    </main>

    <script>
      const $ = (selector) => document.querySelector(selector);
      const STORAGE_KEY = "iknow-admin-worker-url";
      const USER_KEY = "iknow-admin-user";

      $("#workerUrl").value = localStorage.getItem(STORAGE_KEY) || "";
      $("#adminUser").value = localStorage.getItem(USER_KEY) || "admin";

      function setStatus(value) {
        $("#adminStatus").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function getWorkerUrl() {
        const value = $("#workerUrl").value.trim().replace(/\/+$/, "");
        if (!value) throw new Error("Worker URL을 입력하세요.");
        const url = new URL(value);
        if (!["http:", "https:"].includes(url.protocol)) throw new Error("http 또는 https Worker URL만 사용할 수 있습니다.");
        localStorage.setItem(STORAGE_KEY, value);
        localStorage.setItem(USER_KEY, $("#adminUser").value.trim() || "admin");
        return value;
      }

      function getAuthHeader() {
        const user = $("#adminUser").value.trim() || "admin";
        const password = $("#adminPassword").value;
        if (!password) throw new Error("관리자 패스워드를 입력하세요.");
        return `Basic ${btoa(`${user}:${password}`)}`;
      }

      async function requestJson(path, options = {}) {
        const response = await fetch(`${getWorkerUrl()}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: getAuthHeader(),
            ...(options.headers || {}),
          },
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `요청 실패 (${response.status})`);
        return data;
      }

      $("#loadConfig").addEventListener("click", async () => {
        try {
          setStatus("관리자 설정을 불러오는 중...");
          const data = await requestJson("/admin/config");
          $("#model").value = data.model || "gpt-4.1-mini";
          $("#allowedOrigins").value = data.allowedOrigins || "https://lovelyjhk.github.io,http://localhost:8787";
          setStatus(data);
        } catch (error) {
          setStatus(`오류: ${error.message}`);
        }
      });

      $("#testWorker").addEventListener("click", async () => {
        try {
          setStatus("Worker 상태를 확인하는 중...");
          const response = await fetch(`${getWorkerUrl()}/health`);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || `연결 실패 (${response.status})`);
          setStatus(data);
        } catch (error) {
          setStatus(`오류: ${error.message}`);
        }
      });

      $("#saveConfig").addEventListener("click", async () => {
        try {
          setStatus("설정을 저장하는 중...");
          const data = await requestJson("/admin/config", {
            method: "POST",
            body: JSON.stringify({
              openAiApiKey: $("#openAiApiKey").value.trim(),
              model: $("#model").value.trim(),
              allowedOrigins: $("#allowedOrigins").value.trim(),
            }),
          });
          $("#openAiApiKey").value = "";
          setStatus(data);
        } catch (error) {
          setStatus(`오류: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
